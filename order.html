<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đặt bàn</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, sans-serif;
padding:20px;
margin:0;
background:#f4f4f4;
}

h2{
text-align:center;
margin-bottom:20px;
}

/* grid bàn */

#tables{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:15px;
max-width:600px;
margin:auto;
}

/* bàn */

.table{
padding:25px 10px;
border-radius:12px;
color:white;
text-align:center;
font-size:18px;
cursor:pointer;
}

/* trạng thái */

.free{
background:#27ae60;
}

.occupied{
background:#e74c3c;
}

.reserved{
background:#f39c12;
}

/* admin label */

.admin-badge{
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

</style>

</head>

<body>

<h2>Sơ đồ bàn</h2>

<div id="tables"></div>

<div id="adminBadge" class="admin-badge" style="display:none">
ADMIN
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

<script>

/* đọc admin mode từ session */

if(sessionStorage.getItem("admin")==="true"){
isAdmin=true
document.getElementById("adminBadge").style.display="block"
}

/* load bàn */

loadTables()

</script>

</body>
</html>
